<!DOCTYPE html>
<html lang="pt-BR" data-contexto="foco">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fokus</title>

    <link rel="shortcut icon" href="./imagens/favicon.ico">

    <!-- Reset -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Unbounded&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles.css">

    <script src="./script-crud.js" defer></script>
    <script src="./script.js" defer></script>
</head>

<body>
    <main class="app">

        <!-- HEADER -->
        <header class="app__header">
            <img class="app__logo-image" src="./imagens/logo.png" alt="Logo Fokus">
        </header>

        <!-- BANNER -->
        <section class="app__section-banner-container">
            <h1 class="app__title">
                Otimize sua produtividade,<br>
                <strong>mergulhe no que importa.</strong>
            </h1>

            <img class="app__image" src="./imagens/foco.png" alt="Pessoa focada trabalhando">
        </section>

        <!-- TIMER -->
        <section class="app__section-card-container">
            <div class="app__card">

                <!-- MODOS -->
                <ul class="app__card-list">
                    <li><button data-contexto="foco" class="app__card-button active">Foco</button></li>
                    <li><button data-contexto="descanso-curto" class="app__card-button">Descanso curto</button></li>
                    <li><button data-contexto="descanso-longo" class="app__card-button">Descanso longo</button></li>
                </ul>

                <div id="timer" class="app__card-timer" aria-live="polite"></div>

                <!-- TOGGLE -->
                <div class="app__toggle-wrapper">
                    <label class="toggle">
                        <input type="checkbox" id="alternar-musica">
                        <span class="toggle-switch"></span>
                    </label>
                    <label for="alternar-musica">Música</label>
                </div>

                <!-- BOTÃO -->
                <button id="start-pause" class="app__card-primary-button">
                    <img src="./imagens/play_arrow.png" alt="">
                    <span>Começar</span>
                </button>

            </div>
        </section>

        <!-- TASKS -->
        <section class="app__section-task-container">
            <div class="app__section-task-content">

                <header class="app__section-active-task">
                    <p>#Em andamento:</p>
                    <p class="app__section-active-task-description"></p>
                </header>

                <div class="app__section-task-header">
                    <h2>Lista de tarefas</h2>

                    <div class="dropdown-container">
                        <button class="app_button-more" aria-label="Abrir menu">⋮</button>

                        <ul class="dropdown-menu">
                            <li>
                                <button id="btn-remover-concluidas">
                                    Limpar concluídas
                                </button>
                            </li>
                            <li>
                                <button id="btn-remover-todas">
                                    Limpar todas
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>

                <ul class="app__section-task-list"></ul>

                <!-- FORM -->
                <form class="app__form-add-task hidden">
                    <label>Nova tarefa</label>
                    <textarea required placeholder="No que você está trabalhando?"></textarea>

                    <div class="app__form-footer">
                        <button type="button">Cancelar</button>
                        <button type="submit">Salvar</button>
                    </div>
                </form>

                <button class="app__button--add-task">
                    + Nova tarefa
                </button>

            </div>
        </section>

        <footer class="app__footer">
            <p>Projeto fictício • Desenvolvido por Alura</p>
        </footer>

    </main>
</body>
</html>
