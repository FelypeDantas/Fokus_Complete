<!DOCTYPE html>
<html lang="pt-BR" data-contexto="foco">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Fokus</title>

    <meta
        name="description"
        content="Aplicativo Pomodoro para foco, produtividade e gerenciamento de tarefas."
    />

    <link
        rel="shortcut icon"
        href="./imagens/favicon.ico"
        type="image/x-icon"
    />

    <!-- RESET -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
        integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;600;700;800&family=Unbounded:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- JS -->
    <script src="./script-crud.js" defer></script>
    <script src="./script.js" defer></script>
</head>

<body>
    <main class="app">

        <!-- HEADER -->
        <header class="app__header">
            <figure class="app__logo-figure">
                <img
                    class="app__logo-image"
                    src="./imagens/logo.png"
                    alt="Logo Fokus"
                />
            </figure>
        </header>

        <!-- HERO -->
        <section class="app__section-banner-container">

            <div class="app__banner-content">
                <h1 class="app__title">
                    Otimize sua produtividade,
                    <br />

                    <strong class="app__title-strong">
                        mergulhe no que importa.
                    </strong>
                </h1>
            </div>

            <figure class="app__image-figure">
                <img
                    class="app__image"
                    src="./imagens/foco.png"
                    alt="Pessoa concentrada em modo foco"
                />
            </figure>

        </section>

        <!-- TIMER -->
        <section class="app__section-card-container">

            <article class="app__card">

                <!-- MODOS -->
                <ul class="app__card-list">

                    <li>
                        <button
                            type="button"
                            data-contexto="foco"
                            class="app__card-button app__card-button--foco active"
                        >
                            Foco
                        </button>
                    </li>

                    <li>
                        <button
                            type="button"
                            data-contexto="short"
                            class="app__card-button app__card-button--curto"
                        >
                            Descanso curto
                        </button>
                    </li>

                    <li>
                        <button
                            type="button"
                            data-contexto="long"
                            class="app__card-button app__card-button--longo"
                        >
                            Descanso longo
                        </button>
                    </li>

                </ul>

                <!-- TIMER -->
                <div
                    id="timer"
                    class="app__card-timer"
                    aria-live="polite"
                >
                    25:00
                </div>

                <!-- TOGGLE MÚSICA -->
                <div class="app__music-control">

                    <label class="toggle" for="alternar-musica">

                        <input
                            class="toggle-checkbox"
                            type="checkbox"
                            id="alternar-musica"
                        />

                        <span class="toggle-switch"></span>

                    </label>

                    <label
                        class="app__card-list-label"
                        for="alternar-musica"
                    >
                        Música ambiente
                    </label>

                </div>

                <!-- BOTÃO -->
                <div class="app__card-primary-button-wrapper">

                    <button
                        id="start-pause"
                        class="app__card-primary-button"
                        type="button"
                    >

                        <img
                            class="app__card-primary-button-icon"
                            src="./imagens/play_arrow.png"
                            alt=""
                            aria-hidden="true"
                        />

                        <span>Começar</span>

                    </button>

                </div>

            </article>

        </section>

        <!-- TASKS -->
        <section class="app__section-task-container">

            <div class="app__section-task-content">

                <!-- TASK ATIVA -->
                <header class="app__section-active-task">

                    <p class="app__section-active-task-label">
                        #Em andamento:
                    </p>

                    <p class="app__section-active-task-description">
                        Nenhuma tarefa ativa
                    </p>

                </header>

                <!-- HEADER TASKS -->
                <div class="app__section-task-header">

                    <h2 class="app__section-tasks-heading">
                        Lista de tarefas
                    </h2>

                    <!-- DROPDOWN -->
                    <div class="dropdown-container">

                        <button
                            class="app_button-more"
                            type="button"
                            aria-label="Abrir menu de tarefas"
                        >
                            <img
                                src="./imagens/more.svg"
                                alt=""
                                aria-hidden="true"
                            />
                        </button>

                        <ul class="app__section-task-header__ul">

                            <li class="app__section-task-header__li">

                                <button
                                    type="button"
                                    class="app__section-task-header__li__button"
                                    id="btn-remover-concluidas"
                                >

                                    <img
                                        src="./imagens/check.svg"
                                        alt=""
                                        aria-hidden="true"
                                    />

                                    Limpar concluídas

                                </button>

                            </li>

                            <li class="app__section-task-header__li">

                                <button
                                    type="button"
                                    class="app__section-task-header__li__button"
                                    id="btn-remover-todas"
                                >

                                    <img
                                        src="./imagens/trash.svg"
                                        alt=""
                                        aria-hidden="true"
                                    />

                                    Limpar todas

                                </button>

                            </li>

                        </ul>

                    </div>

                </div>

                <!-- LISTA -->
                <ul class="app__section-task-list"></ul>

                <!-- FORM -->
                <form
                    class="app__form-add-task hidden"
                    aria-hidden="true"
                >

                    <div class="app__form-field">

                        <label
                            class="app__form-label"
                            for="task-input"
                        >
                            Nova tarefa
                        </label>

                        <textarea
                            id="task-input"
                            required
                            rows="4"
                            class="app__form-textarea"
                            placeholder="No que você está trabalhando?"
                        ></textarea>

                    </div>

                    <footer class="app__form-footer">

                        <button
                            type="button"
                            class="app__form-footer__button app__form-footer__button--delete"
                        >

                            <img
                                src="./imagens/delete.png"
                                alt=""
                                aria-hidden="true"
                            />

                            Deletar

                        </button>

                        <div class="splitter"></div>

                        <button
                            type="button"
                            class="app__form-footer__button app__form-footer__button--cancel"
                        >

                            <img
                                src="./imagens/close.png"
                                alt=""
                                aria-hidden="true"
                            />

                            Cancelar

                        </button>

                        <button
                            type="submit"
                            class="app__form-footer__button app__form-footer__button--confirm"
                        >

                            <img
                                src="./imagens/save.png"
                                alt=""
                                aria-hidden="true"
                            />

                            Salvar

                        </button>

                    </footer>

                </form>

                <!-- ADD TASK -->
                <button
                    class="app__button--add-task"
                    type="button"
                >

                    <img
                        src="./imagens/add_circle.png"
                        alt=""
                        aria-hidden="true"
                    />

                    Adicionar nova tarefa

                </button>

            </div>

        </section>

        <!-- FOOTER -->
        <footer class="app__footer">

            <p class="app__footer-text">
                Projeto fictício e sem fins comerciais.
                Imagens geradas por IA no Adobe Firefly.
                Desenvolvido por Alura.
            </p>

        </footer>

    </main>
</body>

</html>
